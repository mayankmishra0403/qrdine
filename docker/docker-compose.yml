services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qrdine
      POSTGRES_PASSWORD: ${DB_PASSWORD:-qrdine}
      POSTGRES_DB: qrdine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrdine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  evolution_api:
    image: evoapicloud/evolution-api:latest
    env_file:
      - ./.env
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://qrdine:${DB_PASSWORD:-qrdine}@postgres:5432/evolution?schema=public"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      AUTHENTICATION_EXPOSE_KEY_FINISH: "true"
      AUTHENTICATION_TYPE: "apikey"
      LOG_LEVEL: "ERROR,WEBHOOKS"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://app:3000/api/whatsapp/webhook/"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_SAVE_INSTANCES: "true"
      DEL_INSTANCE: "false"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      MAX_CONNECTIONS: "5"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: "postgresql://qrdine:${DB_PASSWORD:-qrdine}@postgres:5432/qrdine?schema=public"
      REDIS_URL: "redis://redis:6379"
      AUTH_URL: "${AUTH_URL:-https://pos.ritambharat.software}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-https://pos.ritambharat.software}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://pos.ritambharat.software}"
      EVOLUTION_API_URL: "http://evolution_api:8080"
      PRISMA_CLI_BINARY_TARGETS: "linux-musl-openssl-3.0.x,debian-openssl-3.0.x"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
