events {
    worker_connections 1024;
}

http {
    upstream nextjs {
        server app:3000;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name *.qrdine.app qrdine.app;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name qrdine.app;

        ssl_certificate /etc/letsencrypt/live/qrdine.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/qrdine.app/privkey.pem;

        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Wildcard subdomain catch-all
    server {
        listen 443 ssl http2;
        server_name *.qrdine.app;

        ssl_certificate /etc/letsencrypt/live/qrdine.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/qrdine.app/privkey.pem;

        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
