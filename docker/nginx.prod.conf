events {
    worker_connections 1024;
    multi_accept on;
}

http {
    upstream nextjs {
        server app:3000;
        keepalive 64;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name *.qrdine.app qrdine.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main domain
    server {
        listen 443 ssl http2;
        server_name qrdine.app;

        ssl_certificate /etc/letsencrypt/live/qrdine.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/qrdine.app/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Deny access to internal paths
        location ~ /\.(env|git|next) {
            deny all;
        }
    }

    # Wildcard subdomain
    server {
        listen 443 ssl http2;
        server_name *.qrdine.app;

        ssl_certificate /etc/letsencrypt/live/qrdine.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/qrdine.app/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
